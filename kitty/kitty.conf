# shell
shell /bin/zsh

# theme
include current-theme.conf

# font
font_family JetBrainsMono Nerd Font
bold_font JetBrainsMono Nerd Font Bold
italic_font JetBrainsMono Nerd Font Italic
bold_italic_font JetBrainsMono Nerd Font Bold Italic
font_features JetBrainsMonoNF-Regular +liga +calt
font_size 13

# cursor
cursor_shape beam
cursor_beam_thickness 1.8
cursor_blink_interval 0.5
cursor_stop_blinking_after 15.0

# scrollback
scrollback_lines 10000
scrollback_pager_history_size 100

# mouse
mouse_hide_wait 3.0
copy_on_select clipboard
focus_follows_mouse yes
select_by_word_characters @-./:_~?&=%+#
strip_trailing_spaces smart

# performance
repaint_delay 8
input_delay 2
sync_to_monitor yes

# bell
enable_audio_bell no
visual_bell_duration 0.0

# window
window_padding_width 8
hide_window_decorations titlebar-only

# terminal effects
background_opacity 0.85
macos_window_background_blur 20

# tab bar 
tab_bar_edge top             
tab_bar_style powerline
tab_powerline_style slanted
tab_bar_min_tabs 1
tab_bar_align left
show_tab_index yes
tab_title_template " {index}: {title} "
active_tab_font_style bold

# layout
enabled_layouts tall,fat,grid,stack,splits

# keymaps (tabs)
map ctrl+shift+t new_tab   
map ctrl+shift+w close_tab
map ctrl+shift+right next_tab
map ctrl+shift+left previous_tab
map ctrl+shift+1 goto_tab 1
map ctrl+shift+2 goto_tab 2
map ctrl+shift+3 goto_tab 3
map ctrl+shift+4 goto_tab 4
map ctrl+shift+5 goto_tab 5

# keymaps (splits)
map ctrl+shift+enter new_window_with_cwd  
map ctrl+shift+] next_window
map ctrl+shift+[ previous_window
map ctrl+shift+f move_window_forward
map ctrl+shift+r start_resizing_window

# keymaps (hints)
map ctrl+shift+p kitten hints --type path --program default
map ctrl+shift+y kitten hints --type path --program @
map ctrl+shift+i kitten hints --type hash --program @

# keymaps (scrollback)
map ctrl+shift+h show_scrollback

# keymaps (misc)
map ctrl+shift+equal change_font_size all +1.0
map ctrl+shift+minus change_font_size all -1.0

# url handling
open_url_with default
url_style curly                   
detect_urls yes
map ctrl+shift+e open_url_with_hints 